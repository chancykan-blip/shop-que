<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>订单管理</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #080a0f;
            --surface: #0f1117;
            --surface2: #161b26;
            --surface3: #1c2335;
            --border: #1e2640;
            --border2: #2a3550;
            --accent: #00f5a0;
            --accent-dim: rgba(0,245,160,0.08);
            --blue: #4db8ff;
            --blue-dim: rgba(77,184,255,0.08);
            --orange: #ff9f43;
            --red: #ff6b6b;
            --text: #e2e8f0;
            --muted: #4a5568;
            --muted2: #718096;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(rgba(0,245,160,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,245,160,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(77,184,255,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            position: relative;
            z-index: 10;
            background: rgba(15,17,23,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .header-nav { display: flex; gap: 4px; }
        .nav-item {
            padding: 5px 14px;
            font-size: 12px;
            color: var(--muted2);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'IBM Plex Mono', monospace;
            text-decoration: none;
            display: inline-block;
        }
        .nav-item:hover { color: var(--text); background: var(--surface2); }
        .nav-item.active { color: var(--accent); background: var(--accent-dim); }

        .time-display {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .main {
            position: relative;
            z-index: 1;
            padding: 24px 32px;
            max-width: 1400px;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.5s ease forwards 0.1s;
        }

        .page-title { font-size: 22px; font-weight: 300; letter-spacing: -0.02em; }
        .page-title span { color: var(--blue); }
        .page-subtitle { font-size: 12px; color: var(--muted2); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s ease forwards;
            transition: border-color 0.3s, transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-2px); }
        .stat-card:nth-child(1) { animation-delay: 0.15s; }
        .stat-card:nth-child(2) { animation-delay: 0.22s; }
        .stat-card:nth-child(3) { animation-delay: 0.29s; }
        .stat-card:nth-child(4) { animation-delay: 0.36s; }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
        }

        .c-blue::before   { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
        .c-green::before  { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
        .c-orange::before { background: linear-gradient(90deg, transparent, var(--orange), transparent); }
        .c-red::before    { background: linear-gradient(90deg, transparent, var(--red), transparent); }

        .stat-card:hover.c-blue   { border-color: rgba(77,184,255,0.3); }
        .stat-card:hover.c-green  { border-color: rgba(0,245,160,0.3); }
        .stat-card:hover.c-orange { border-color: rgba(255,159,67,0.3); }
        .stat-card:hover.c-red    { border-color: rgba(255,107,107,0.3); }

        .stat-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 28px;
            font-weight: 300;
            line-height: 1;
        }

        .c-blue   .stat-value { color: var(--blue); }
        .c-green  .stat-value { color: var(--accent); }
        .c-orange .stat-value { color: var(--orange); }
        .c-red    .stat-value { color: var(--red); }

        /* 工具栏 */
        .toolbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.4s;
        }

        .filter-group { display: flex; gap: 10px; align-items: flex-end; }

        .field-wrap label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        select, input[type="text"], input[type="date"], input[type="number"] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Noto Sans SC', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }

        select:focus, input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(77,184,255,0.08);
        }

        .btn {
            padding: 8px 18px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--blue);
            color: #080a0f;
            font-weight: 500;
        }
        .btn-primary:hover { background: #38a8f0; transform: translateY(-1px); }

        .btn-add {
            background: var(--surface2);
            color: var(--accent);
            border: 1px solid rgba(0,245,160,0.25);
            font-weight: 500;
        }
        .btn-add:hover { background: var(--accent-dim); border-color: rgba(0,245,160,0.5); transform: translateY(-1px); }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.15s;
        }

        .btn-del-sm {
            background: rgba(255,107,107,0.1);
            color: var(--red);
            border: 1px solid rgba(255,107,107,0.2);
        }
        .btn-del-sm:hover { background: rgba(255,107,107,0.2); }

        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }
        .status-dot.loading { animation: pulse 1s ease-in-out infinite; background: var(--orange); }

        /* 表格 */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.45s;
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 11px 16px;
            text-align: left;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 400;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr {
            animation: rowIn 0.3s ease forwards;
            opacity: 0;
        }

        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        tbody tr:hover td { background: var(--surface2); }
        tbody tr:last-child td { border-bottom: none; }

        .id-cell { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
        .name-cell { font-weight: 500; }
        .amount-cell { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--blue); }
        .date-cell { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted2); }

        /* 弹窗 */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-bg.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 32px;
            width: 420px;
            transform: scale(0.95) translateY(10px);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-bg.open .modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-title { font-size: 16px; font-weight: 500; }

        .modal-close {
            width: 28px; height: 28px;
            border-radius: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted2);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .modal-close:hover { background: var(--surface3); color: var(--text); }

        .form-row { margin-bottom: 16px; }
        .form-row label {
            display: block;
            font-size: 11px;
            color: var(--muted2);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-row input, .form-row select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); }
        .form-row input:focus, .form-row select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(77,184,255,0.08); }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted2);
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.15s;
        }
        .btn-ghost:hover { border-color: var(--text); color: var(--text); }

        /* 确认弹窗 */
        .confirm-modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 28px;
            width: 360px;
            text-align: center;
        }

        .confirm-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 20px;
        }

        .confirm-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
        .confirm-desc { font-size: 13px; color: var(--muted2); margin-bottom: 24px; line-height: 1.6; }
        .confirm-btns { display: flex; gap: 10px; justify-content: center; }

        .btn-danger {
            background: rgba(255,107,107,0.15);
            color: var(--red);
            border: 1px solid rgba(255,107,107,0.3);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.15s;
        }
        .btn-danger:hover { background: rgba(255,107,107,0.25); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 12px 18px;
            font-size: 13px;
            z-index: 300;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(0,245,160,0.3); color: var(--accent); }
        .toast.error   { border-color: rgba(255,107,107,0.3); color: var(--red); }

        .empty-state { padding: 60px; text-align: center; color: var(--muted); }
        .empty-state p { font-size: 13px; font-family: 'IBM Plex Mono', monospace; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="logo">
            <div class="logo-dot"></div>
            ADMIN · SHOP_DB
        </div>
        <div class="header-nav">
            <a class="nav-item" href="/index.html">用户管理</a>
            <a class="nav-item active" href="/orders.html">订单数据</a>
            <a class="nav-item" href="/report.html">数据报表</a>
        </div>
    </div>
    <div class="header-right">
        <span class="time-display" id="clock"></span>
        <button class="btn btn-add" onclick="openAdd()"><i class="fas fa-plus"></i> 新增订单</button>
    </div>
</div>

<div class="main">

    <div class="page-header">
        <div>
            <div class="page-title">订单<span>管理</span>面板</div>
            <div class="page-subtitle">// order management · real-time</div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats">
        <div class="stat-card c-blue">
            <div class="stat-label">总订单数</div>
            <div class="stat-value" id="s-total">—</div>
        </div>
        <div class="stat-card c-green">
            <div class="stat-label">总金额</div>
            <div class="stat-value" id="s-amount">—</div>
        </div>
        <div class="stat-card c-orange">
            <div class="stat-label">平均金额</div>
            <div class="stat-value" id="s-avg">—</div>
        </div>
        <div class="stat-card c-red">
            <div class="stat-label">最大单笔</div>
            <div class="stat-value" id="s-max">—</div>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="filter-group">
            <div class="field-wrap">
                <label>搜索用户</label>
                <input type="text" id="f-search" placeholder="输入用户名..." oninput="filterTable()">
            </div>
            <div class="field-wrap">
                <label>日期从</label>
                <input type="date" id="f-from" onchange="filterTable()">
            </div>
            <div class="field-wrap">
                <label>日期到</label>
                <input type="date" id="f-to" onchange="filterTable()">
            </div>
            <button class="btn btn-primary" onclick="resetFilter()">
                <i class="fas fa-rotate-left"></i> 重置
            </button>
        </div>
        <button class="btn btn-add" onclick="exportCSV()">
            <i class="fas fa-file-export"></i> 导出 CSV
        </button>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-msg">初始化中...</span>
    </div>

    <!-- 表格 -->
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>订单 ID</th>
                <th>用户</th>
                <th>地区</th>
                <th>金额</th>
                <th>日期</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<!-- 新增订单弹窗 -->
<div class="modal-bg" id="modal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">新增订单</div>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="form-row">
            <label>选择用户</label>
            <select id="f-user"></select>
        </div>
        <div class="form-row">
            <label>金额（元）</label>
            <input type="number" id="f-amount" placeholder="例：888">
        </div>
        <div class="form-row">
            <label>订单日期</label>
            <input type="date" id="f-date">
        </div>
        <div class="modal-footer">
            <button class="btn-ghost" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveOrder()">保存</button>
        </div>
    </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-bg" id="confirm-modal">
    <div class="confirm-modal">
        <div class="confirm-icon">⚠</div>
        <div class="confirm-title">确认删除</div>
        <div class="confirm-desc" id="confirm-desc">此操作不可撤销。</div>
        <div class="confirm-btns">
            <button class="btn-ghost" onclick="closeConfirm()">取消</button>
            <button class="btn-danger" id="confirm-ok">确认删除</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let allOrders = [];
    let filtered  = [];

    // 时钟
    function updateClock() {
        document.getElementById('clock').textContent =
            new Date().toLocaleTimeString('zh-CN', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    window.onload = () => {
        loadOrders();
        loadUsers();
        // 默认日期范围：近一年
        const today = new Date().toISOString().split('T')[0];
        const lastYear = new Date(Date.now() - 365*24*60*60*1000).toISOString().split('T')[0];
        document.getElementById('f-to').value   = today;
        document.getElementById('f-from').value = lastYear;
    };

    function setStatus(loading, msg) {
        document.getElementById('status-dot').className = 'status-dot' + (loading ? ' loading' : '');
        document.getElementById('status-msg').textContent = msg;
    }

    // 加载订单
    function loadOrders() {
        setStatus(true, '正在加载订单...');
        fetch('/orders')
            .then(r => r.json())
            .then(data => {
                allOrders = data.map(row => {
                    const p = row.split('|');
                    return { id: p[0], name: p[1], region: p[2], amount: parseFloat(p[3]), date: p[4] };
                });
                filterTable();
                setStatus(false, '共 ' + allOrders.length + ' 条订单 · 已同步');
            })
            .catch(() => setStatus(false, '加载失败'));
    }

    // 加载用户列表（给新增弹窗用）
    function loadUsers() {
        fetch('/users/all')
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById('f-user');
                select.innerHTML = data.map(row => {
                    const p = row.split('|');
                    return `<option value="${p[0]}">${p[1]}</option>`;
                }).join('');
            });
    }

    // 筛选
    function filterTable() {
        const keyword = document.getElementById('f-search').value.toLowerCase();
        const from    = document.getElementById('f-from').value;
        const to      = document.getElementById('f-to').value;

        filtered = allOrders.filter(o => {
            if (keyword && !o.name.toLowerCase().includes(keyword)) return false;
            if (from && o.date < from) return false;
            if (to   && o.date > to)   return false;
            return true;
        });

        renderTable(filtered);
        renderStats(filtered);
        setStatus(false, '显示 ' + filtered.length + ' / ' + allOrders.length + ' 条订单');
    }

    function resetFilter() {
        document.getElementById('f-search').value = '';
        document.getElementById('f-from').value   = '';
        document.getElementById('f-to').value     = '';
        filterTable();
    }

    function renderTable(data) {
        const tbody = document.getElementById('tbody');
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6">
        <div class="empty-state"><p>// no orders found</p></div>
      </td></tr>`;
            return;
        }
        tbody.innerHTML = data.map((o, i) => `
      <tr style="animation-delay:${i * 0.03}s">
        <td class="id-cell">#${o.id}</td>
        <td class="name-cell">${o.name}</td>
        <td style="color:var(--muted2)">${o.region}</td>
        <td class="amount-cell">¥ ${o.amount.toLocaleString()}</td>
        <td class="date-cell">${o.date}</td>
        <td>
          <button class="btn-sm btn-del-sm" onclick="confirmDelete('${o.id}', '${o.name}', '${o.amount}')">
            <i class="fas fa-trash"></i> 删除
          </button>
        </td>
      </tr>
    `).join('');
    }

    function renderStats(data) {
        const total  = data.length;
        const amount = data.reduce((s, o) => s + o.amount, 0);
        const avg    = total ? Math.round(amount / total) : 0;
        const max    = total ? Math.max(...data.map(o => o.amount)) : 0;
        animateNum('s-total',  total,            '');
        animateNum('s-amount', Math.round(amount), '¥');
        animateNum('s-avg',    avg,              '¥');
        animateNum('s-max',    max,              '¥');
    }

    function animateNum(id, to, prefix) {
        const el = document.getElementById(id);
        const start = performance.now();
        function step(now) {
            const p = Math.min((now - start) / 600, 1);
            const e = 1 - Math.pow(1 - p, 3);
            el.textContent = prefix + Math.round(to * e).toLocaleString();
            if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    // 新增订单
    function openAdd() {
        document.getElementById('f-amount').value = '';
        document.getElementById('f-date').value   = new Date().toISOString().split('T')[0];
        document.getElementById('modal').classList.add('open');
        setTimeout(() => document.getElementById('f-amount').focus(), 300);
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    function saveOrder() {
        const userId = document.getElementById('f-user').value;
        const amount = document.getElementById('f-amount').value.trim();
        const date   = document.getElementById('f-date').value;

        if (!amount || !date) { showToast('金额和日期不能为空', 'error'); return; }

        const params = new URLSearchParams({ userId, amount, orderDate: date });
        fetch('/order/add?' + params.toString(), { method: 'POST' })
            .then(r => r.text())
            .then(result => {
                if (result === 'success') {
                    closeModal();
                    loadOrders();
                    showToast('订单新增成功', 'success');
                } else {
                    showToast('新增失败：' + result, 'error');
                }
            });
    }

    // 删除确认
    function confirmDelete(id, name, amount) {
        document.getElementById('confirm-desc').textContent =
            '即将删除 ' + name + ' 的订单 #' + id + '（¥' + parseFloat(amount).toLocaleString() + '），此操作不可撤销。';
        document.getElementById('confirm-modal').classList.add('open');
        document.getElementById('confirm-ok').onclick = () => doDelete(id);
    }

    function closeConfirm() {
        document.getElementById('confirm-modal').classList.remove('open');
    }

    function doDelete(id) {
        closeConfirm();
        fetch('/order/delete/' + id, { method: 'DELETE' })
            .then(r => r.text())
            .then(result => {
                if (result === 'success') {
                    loadOrders();
                    showToast('订单已删除', 'success');
                } else {
                    showToast('删除失败：' + result, 'error');
                }
            });
    }

    // 导出 CSV
    function exportCSV() {
        if (!filtered.length) { showToast('暂无数据可导出', 'error'); return; }
        const header = '订单ID,用户,地区,金额,日期';
        const rows   = filtered.map(o => `${o.id},${o.name},${o.region},${o.amount},${o.date}`);
        const blob   = new Blob([[header, ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
        const a      = document.createElement('a');
        a.href       = URL.createObjectURL(blob);
        a.download   = '订单数据_' + new Date().toLocaleDateString('zh-CN') + '.csv';
        a.click();
        showToast('导出成功', 'success');
    }

    function showToast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = (type === 'success' ? '✓  ' : '✕  ') + msg;
        el.className = 'toast ' + type + ' show';
        setTimeout(() => el.classList.remove('show'), 2800);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeModal(); closeConfirm(); }
    });
</script>
</body>
</html>
