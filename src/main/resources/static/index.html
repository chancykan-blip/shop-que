<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>用户管理系统</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:       #f0f0ee;
            --surface:  #fafaf8;
            --surface2: #e8e8e5;
            --surface3: #ddddd9;
            --border:   #d4d4cf;
            --border2:  #c8c8c2;
            --text:     #1a1a18;
            --text2:    #4a4a46;
            --text3:    #8a8a84;
            --blue:     #2563eb;
            --green:    #16a34a;
            --orange:   #d97706;
            --red:      #dc2626;
            --mono:     'IBM Plex Mono', monospace;
            --sans:     'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 13px;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 0; }

        .logo {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            letter-spacing: 0.06em;
            font-weight: 500;
            padding-right: 16px;
            border-right: 1px solid var(--border);
            margin-right: 4px;
        }

        .nav-item {
            padding: 4px 12px;
            font-size: 12px;
            color: var(--text3);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: var(--mono);
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.03em;
        }
        .nav-item:hover  { color: var(--text); background: var(--surface2); }
        .nav-item.active { color: var(--text); background: var(--surface2); font-weight: 500; }

        .header-right { display: flex; align-items: center; gap: 8px; }

        .time-display {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text3);
            letter-spacing: 0.04em;
        }

        .main { padding: 16px 24px; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            opacity: 0;
            transform: translateY(8px);
            animation: fadeUp 0.3s ease forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-label {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 500;
            line-height: 1;
            color: var(--text);
        }

        .stat-icon {
            width: 32px; height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .si-blue   { background: #eff6ff; color: var(--blue); }
        .si-green  { background: #f0fdf4; color: var(--green); }
        .si-orange { background: #fffbeb; color: var(--orange); }
        .si-red    { background: #fef2f2; color: var(--red); }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }

        .filter-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

        .field-label {
            font-size: 11px;
            color: var(--text3);
            font-family: var(--mono);
            white-space: nowrap;
        }

        select, input[type="text"] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-family: var(--sans);
            outline: none;
            transition: border-color 0.15s;
            height: 28px;
        }

        select:focus, input[type="text"]:focus { border-color: var(--blue); }

        .btn {
            padding: 5px 12px;
            border-radius: 3px;
            border: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
            font-family: var(--sans);
            transition: all 0.15s;
            white-space: nowrap;
            height: 28px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--surface);
            color: var(--text2);
        }
        .btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--text); }

        .btn-dark {
            background: var(--text);
            color: var(--surface);
            border-color: var(--text);
        }
        .btn-dark:hover { background: var(--text2); color: var(--surface); }

        .btn-sm {
            padding: 3px 8px;
            border-radius: 3px;
            border: 1px solid var(--border);
            font-size: 11px;
            cursor: pointer;
            font-family: var(--sans);
            transition: all 0.15s;
            background: var(--surface);
            color: var(--text2);
            height: 22px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-edit-sm:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--blue); }
        .btn-del-sm:hover  { background: #fef2f2; border-color: #fecaca; color: var(--red); }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 0.04em;
        }

        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
        .status-dot.loading { background: var(--orange); animation: blink 1s ease-in-out infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }

        th {
            padding: 7px 12px;
            text-align: left;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 400;
            white-space: nowrap;
        }

        td {
            padding: 7px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            white-space: nowrap;
        }

        tbody tr:hover td { background: var(--bg); }
        tbody tr:last-child td { border-bottom: none; }

        .id-cell     { font-family: var(--mono); font-size: 11px; color: var(--text3); }
        .name-cell   { font-weight: 500; }
        .email-cell  { font-family: var(--mono); font-size: 11px; color: var(--text3); }
        .amount-cell { font-family: var(--mono); font-weight: 500; }
        .actions     { display: flex; gap: 4px; }

        .badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 2px;
            font-size: 10px;
            font-family: var(--mono);
            letter-spacing: 0.04em;
            border: 1px solid;
        }

        .badge-vip      { background: #fffbeb; color: #92400e; border-color: #fde68a; }
        .badge-active   { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .badge-inactive { background: #fef2f2; color: #991b1b; border-color: #fecaca; }

        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-bg.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 20px;
            width: 380px;
            transform: scale(0.97) translateY(8px);
            opacity: 0;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-bg.open .modal { transform: scale(1) translateY(0); opacity: 1; }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title { font-size: 13px; font-weight: 500; }

        .modal-close {
            width: 22px; height: 22px;
            border-radius: 3px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text3);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .modal-close:hover { background: var(--surface3); color: var(--text); }

        .form-row { margin-bottom: 10px; }
        .form-row label {
            display: block;
            font-size: 10px;
            color: var(--text3);
            font-family: var(--mono);
            letter-spacing: 0.06em;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .form-row input[type="text"],
        .form-row select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            height: 30px;
        }

        .modal-footer {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .confirm-modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 20px;
            width: 320px;
            text-align: center;
        }

        .confirm-icon {
            width: 36px; height: 36px;
            border-radius: 4px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 14px;
            color: var(--red);
        }

        .confirm-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .confirm-desc  { font-size: 12px; color: var(--text3); margin-bottom: 16px; line-height: 1.5; }
        .confirm-btns  { display: flex; gap: 6px; justify-content: center; }

        .btn-danger {
            background: #fef2f2;
            color: var(--red);
            border: 1px solid #fecaca;
            padding: 5px 14px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--sans);
            transition: all 0.15s;
        }
        .btn-danger:hover { background: #fee2e2; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 4px;
            padding: 8px 14px;
            font-size: 12px;
            z-index: 300;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateY(12px);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            font-family: var(--mono);
            letter-spacing: 0.03em;
        }
        .toast.show    { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 3px solid var(--green); color: var(--green); }
        .toast.error   { border-left: 3px solid var(--red);   color: var(--red); }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text3);
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="logo">SHOP_DB</div>
        <a class="nav-item active" href="/index.html">用户管理</a>
        <a class="nav-item" href="/orders.html">订单数据</a>
        <a class="nav-item" href="/report.html">数据报表</a>
    </div>
    <div class="header-right">
        <span class="time-display" id="clock"></span>
        <button class="btn btn-dark" onclick="openAdd()">
            <i class="fas fa-plus"></i> 新增用户
        </button>
    </div>
</div>

<div class="main">

    <div class="stats">
        <div class="stat-card">
            <div>
                <div class="stat-label">总用户</div>
                <div class="stat-value" id="s-total">—</div>
            </div>
            <div class="stat-icon si-blue"><i class="fas fa-users"></i></div>
        </div>
        <div class="stat-card">
            <div>
                <div class="stat-label">总消费</div>
                <div class="stat-value" id="s-amount">—</div>
            </div>
            <div class="stat-icon si-green"><i class="fas fa-yen-sign"></i></div>
        </div>
        <div class="stat-card">
            <div>
                <div class="stat-label">VIP 用户</div>
                <div class="stat-value" id="s-vip">—</div>
            </div>
            <div class="stat-icon si-orange"><i class="fas fa-crown"></i></div>
        </div>
        <div class="stat-card">
            <div>
                <div class="stat-label">不活跃</div>
                <div class="stat-value" id="s-inactive">—</div>
            </div>
            <div class="stat-icon si-red"><i class="fas fa-user-slash"></i></div>
        </div>
    </div>

    <div class="toolbar">
        <div class="filter-group">
            <span class="field-label">地区</span>
            <select id="f-region">
                <option value="">全部</option>
                <option value="华东">华东</option>
                <option value="华南">华南</option>
                <option value="华北">华北</option>
                <option value="西南">西南</option>
            </select>
            <span class="field-label">状态</span>
            <select id="f-status">
                <option value="">全部</option>
                <option value="vip">VIP</option>
                <option value="active">活跃</option>
                <option value="inactive">不活跃</option>
            </select>
            <button class="btn btn-dark" onclick="loadData()">
                <i class="fas fa-search"></i> 查询
            </button>
            <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV()">
            <button class="btn" onclick="document.getElementById('csv-file').click()">
                <i class="fas fa-file-import"></i> 导入
            </button>
            <button class="btn" onclick="exportCSV()">
                <i class="fas fa-file-export"></i> 导出
            </button>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-msg">初始化中...</span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>邮箱</th>
                <th>地区</th>
                <th>状态</th>
                <th>总消费</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div class="modal-bg" id="modal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">新增用户</div>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <input type="hidden" id="edit-id">
        <div class="form-row"><label>姓名</label><input type="text" id="f-name" placeholder="张伟"></div>
        <div class="form-row"><label>邮箱</label><input type="text" id="f-email" placeholder="example@mail.com"></div>
        <div class="form-row">
            <label>地区</label>
            <select id="f-reg">
                <option>华东</option><option>华南</option><option>华北</option><option>西南</option>
            </select>
        </div>
        <div class="form-row">
            <label>状态</label>
            <select id="f-stat">
                <option value="active">活跃</option>
                <option value="vip">VIP</option>
                <option value="inactive">不活跃</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">取消</button>
            <button class="btn btn-dark" onclick="saveUser()">保存</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="confirm-modal">
    <div class="confirm-modal">
        <div class="confirm-icon"><i class="fas fa-trash"></i></div>
        <div class="confirm-title">确认删除</div>
        <div class="confirm-desc" id="confirm-desc">此操作不可撤销。</div>
        <div class="confirm-btns">
            <button class="btn" onclick="closeConfirm()">取消</button>
            <button class="btn-danger" id="confirm-ok">删除</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let allData = [];

    function updateClock() {
        document.getElementById('clock').textContent =
            new Date().toLocaleTimeString('zh-CN', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    window.onload = () => loadData();

    function setStatus(loading, msg) {
        document.getElementById('status-dot').className = 'status-dot' + (loading ? ' loading' : '');
        document.getElementById('status-msg').textContent = msg;
    }

    function loadData() {
        const region = document.getElementById('f-region').value;
        const status = document.getElementById('f-status').value;
        setStatus(true, 'querying...');
        fetch('/search?region=' + encodeURIComponent(region) + '&status=' + encodeURIComponent(status))
            .then(r => r.json())
            .then(data => {
                allData = data.map(row => {
                    const p = row.split('|');
                    return { id: p[0], name: p[1], email: p[2], region: p[3], status: p[4], amount: parseFloat(p[5]) };
                });
                renderTable(allData);
                renderStats(allData);
                setStatus(false, allData.length + ' records · synced');
            })
            .catch(() => setStatus(false, 'connection failed'));
    }

    function renderTable(data) {
        const tbody = document.getElementById('tbody');
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">// no records found</div></td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(u => `
      <tr>
        <td class="id-cell">${u.id}</td>
        <td class="name-cell">${u.name}</td>
        <td class="email-cell">${u.email}</td>
        <td>${u.region}</td>
        <td>${badge(u.status)}</td>
        <td class="amount-cell">¥${u.amount.toLocaleString()}</td>
        <td>
          <div class="actions">
            <button class="btn-sm btn-edit-sm" onclick="openEdit('${u.id}')">
              <i class="fas fa-pen"></i> 编辑
            </button>
            <button class="btn-sm btn-del-sm" onclick="confirmDelete('${u.id}', '${u.name}')">
              <i class="fas fa-trash"></i> 删除
            </button>
          </div>
        </td>
      </tr>
    `).join('');
    }

    function renderStats(data) {
        animateNum('s-total',    data.length,                                    '');
        animateNum('s-amount',   Math.round(data.reduce((s,u)=>s+u.amount,0)),  '¥');
        animateNum('s-vip',      data.filter(u=>u.status==='vip').length,        '');
        animateNum('s-inactive', data.filter(u=>u.status==='inactive').length,   '');
    }

    function animateNum(id, to, prefix) {
        const el = document.getElementById(id);
        const start = performance.now();
        function step(now) {
            const p = Math.min((now - start) / 500, 1);
            const e = 1 - Math.pow(1 - p, 3);
            el.textContent = prefix + Math.round(to * e).toLocaleString();
            if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    function badge(status) {
        const map   = { vip: 'badge-vip', active: 'badge-active', inactive: 'badge-inactive' };
        const label = { vip: 'VIP', active: '活跃', inactive: '不活跃' };
        return `<span class="badge ${map[status]}">${label[status]}</span>`;
    }

    function openAdd() {
        document.getElementById('modal-title').textContent = '新增用户';
        document.getElementById('edit-id').value  = '';
        document.getElementById('f-name').value   = '';
        document.getElementById('f-email').value  = '';
        document.getElementById('f-reg').value    = '华东';
        document.getElementById('f-stat').value   = 'active';
        document.getElementById('modal').classList.add('open');
        setTimeout(() => document.getElementById('f-name').focus(), 200);
    }

    function openEdit(id) {
        const u = allData.find(u => u.id == id);
        document.getElementById('modal-title').textContent = '编辑用户';
        document.getElementById('edit-id').value  = u.id;
        document.getElementById('f-name').value   = u.name;
        document.getElementById('f-email').value  = u.email;
        document.getElementById('f-reg').value    = u.region;
        document.getElementById('f-stat').value   = u.status;
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    function saveUser() {
        const id     = document.getElementById('edit-id').value;
        const name   = document.getElementById('f-name').value.trim();
        const email  = document.getElementById('f-email').value.trim();
        const region = document.getElementById('f-reg').value;
        const status = document.getElementById('f-stat').value;
        if (!name || !email) { showToast('姓名和邮箱不能为空', 'error'); return; }
        const params = new URLSearchParams({ name, email, region, status });
        const isEdit = id !== '';
        fetch((isEdit ? '/user/update/' + id : '/user/add') + '?' + params, { method: isEdit ? 'PUT' : 'POST' })
            .then(r => r.text())
            .then(result => {
                if (result === 'success') { closeModal(); loadData(); showToast(isEdit ? '已更新' : '已新增', 'success'); }
                else showToast('失败：' + result, 'error');
            });
    }

    function confirmDelete(id, name) {
        document.getElementById('confirm-desc').textContent = '将删除用户「' + name + '」及其所有订单，不可恢复。';
        document.getElementById('confirm-modal').classList.add('open');
        document.getElementById('confirm-ok').onclick = () => doDelete(id, name);
    }

    function closeConfirm() { document.getElementById('confirm-modal').classList.remove('open'); }

    function doDelete(id, name) {
        closeConfirm();
        fetch('/user/delete/' + id, { method: 'DELETE' })
            .then(r => r.text())
            .then(result => {
                if (result === 'success') { loadData(); showToast('「' + name + '」已删除', 'success'); }
                else showToast('删除失败', 'error');
            });
    }

    function importCSV() {
        const file = document.getElementById('csv-file').files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        setStatus(true, '正在导入...');
        fetch('/user/import', { method: 'POST', body: formData })
            .then(r => r.text())
            .then(result => {
                if (result.startsWith('success')) { loadData(); showToast('导入 ' + result.split(':')[1] + ' 条', 'success'); }
                else showToast('导入失败', 'error');
                document.getElementById('csv-file').value = '';
            });
    }

    function exportCSV() {
        if (!allData.length) { showToast('暂无数据', 'error'); return; }
        const header = 'ID,姓名,邮箱,地区,状态,总消费';
        const rows   = allData.map(u => `${u.id},${u.name},${u.email},${u.region},${u.status},${u.amount}`);
        const blob   = new Blob([[header, ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
        const a      = document.createElement('a');
        a.href       = URL.createObjectURL(blob);
        a.download   = '用户_' + new Date().toLocaleDateString('zh-CN') + '.csv';
        a.click();
        showToast('导出成功', 'success');
    }

    function showToast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
        el.className = 'toast ' + type + ' show';
        setTimeout(() => el.classList.remove('show'), 2500);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeModal(); closeConfirm(); }
    });
</script>
</body>
</html>
